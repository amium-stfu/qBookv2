- Type: LogControl

  Identity:
    Name: log1
    Path: UdlBook/Page1/udl1/log1
    Id: demo-log-1

  Rect:
    X: 100
    Y: 100
    Width: 360
    Height: 220

  Design:
    CornerRadius: 12
    BorderWidth: 1
    BorderColor: null        # Theme
    BackColor: null          # Theme
    ToolTip: ""

  Header:
    ControlCaption: Log
    HeaderForeColor: null    # Theme
    CaptionVisible: true
    HeaderCornerRadius: 6
    HeaderBorderWidth: 0
    HeaderBorderColor: null  # Theme
    HeaderBackColor: null    # Theme

  Body:
    BodyCaption: ""
    BodyCaptionPosition: Top
    BodyForeColor: null      # Theme
    BodyCaptionVisible: false
    BodyCornerRadius: 8
    BodyBorderWidth: 0
    BodyBorderColor: null    # Theme
    BodyBackColor: null      # Theme

  Footer:
    ShowFooter: true
    FooterCornerRadius: 6
    FooterBorderWidth: 0
    FooterBorderColor: null  # Theme
    FooterBackColor: null    # Theme

  InteractionRules:
    - Event: BodyLeftClick
      Action: OpenValueEditor
      TargetPath: "this"
      Argument: ""

  Control:
    TargetLog: Logs/Host