- Type: UdlClientControl

  Identity:
    Name: udl1
    Path: UdlBook/Page1/udl1
    Id: demo-udl-1

  Rect:
    X: 40
    Y: 100
    Width: 460
    Height: 220

  Design:
    CornerRadius: 12
    BorderWidth: 1
    BorderColor: null        # Theme
    BackColor: null          # Theme
    ToolTip: ""

  Header:
    ControlCaption: ""
    HeaderForeColor: null    # Theme
    CaptionVisible: true
    HeaderCornerRadius: 6
    HeaderBorderWidth: 0
    HeaderBorderColor: null  # Theme
    HeaderBackColor: null    # Theme

  Body:
    BodyCaption: UdlClient
    BodyCaptionPosition: Top
    BodyForeColor: null      # Theme
    BodyCaptionVisible: true
    BodyCornerRadius: 0
    BodyBorderWidth: 0
    BodyBorderColor: null    # Theme
    BodyBackColor: null      # Theme

  Footer:
    ShowFooter: true
    FooterCornerRadius: 6
    FooterBorderWidth: 0
    FooterBorderColor: null  # Theme
    FooterBackColor: null    # Theme

  InteractionRules:
    - Event: BodyLeftClick
      Action: OpenValueEditor
      TargetPath: "this"
      Argument: ""

  Control:
    UdlClientHost: 192.168.178.151
    UdlClientPort: 9001
    UdlClientAutoConnect: false
    UdlClientDebugLogging: false
    UdlAttachedItemPaths: "m310"
